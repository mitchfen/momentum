name: CI

on:
  pull_request:
    branches: [ "main" ]

concurrency:
  group: "build-and-test-${{ github.head_ref }}"
  cancel-in-progress: true

jobs:
  go:
    name: Go build and vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: src/go.mod

      - name: Build
        run: go build ./...
        working-directory: src

      - name: Vet
        run: go vet ./...
        working-directory: src

  build-and-test:
    name: Docker smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build Docker image
        run: docker build -f deploy/Dockerfile -t momentum:test .

      - name: Run container
        run: |
          docker run -d --name momentum -p 8080:80 -e "DAILY_TASKS=CITestTask1" momentum:test
          sleep 5

      - name: Test site availability
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          echo "Response Code: $HTTP_CODE"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Error: Site returned $HTTP_CODE"
            docker logs momentum
            exit 1
          fi
